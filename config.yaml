agents:
  builtin_dir: "agents/builtin"
  external_dir: "agents/external/agency-agents"
  matching:
    auto_match_threshold: 4
    max_candidates: 5
  adapter:
    min_confidence: 0.3
    cache_ttl: 3600

execution:
  mode: agent-teams
  timeout: 600000
  env_flag: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS

llm:
  bridge: claude-cli
  retry: 3
